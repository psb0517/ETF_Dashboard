name: Daily ETF Dashboard Update

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 평일 UTC 01:00 (한국 10:00)
  workflow_dispatch:        # GitHub 사이트에서 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        run: python etf_dashboard.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet && echo "변경 없음, 커밋 건너뜀" || \
            git commit -m "chore: update ETF dashboard $(date +%Y-%m-%d)" && git push
